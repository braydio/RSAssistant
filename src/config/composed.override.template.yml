services:
  rsassistant:
    build:
      context: ./RSAssistant  # Path to your directory containing your Dockerfile
      dockerfile: Dockerfile  # Your Dockerfile stays within your directory
    container_name: rsassistant
    env_file:
      - ./RSAssistant/.env  # Keep your .env in your directory
    volumes:
      - ./RSAssistant/volumes/logs:/app/logs               # Logs specific to RSAssistant
      - ./RSAssistant/volumes/excel:/app/excel             # Excel files shared with your bot
      - ./RSAssistant/volumes/excel/archive:/app/archive   # Archived files
    networks:
      - shared-network
    restart: unless-stopped

networks:
  shared-network:
    external: true
